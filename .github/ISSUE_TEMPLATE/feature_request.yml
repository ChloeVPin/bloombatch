name: Feature request
description: Suggest an improvement for bloombatch
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for bloombatch? Share the problem first, then the solution you want.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What is difficult or missing right now
      placeholder: I often need to preview numbering with custom start values
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your ideal behavior or UI
      placeholder: Add a Number rule option for start value and increment
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or alternate approach you have tried
      placeholder: I currently rename in two separate passes
    validations:
      required: false
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who this helps and how often it matters
      placeholder: Helps photographers batch naming folders daily
    validations:
      required: false
